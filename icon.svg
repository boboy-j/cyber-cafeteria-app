<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a120a"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b89a"/>
      <stop offset="100%" stop-color="#b8977a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Chrome ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#7a6a4a" stroke-width="3"/>
  <!-- Plate -->
  <circle cx="256" cy="256" r="150" fill="url(#plate)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="120" fill="#1a120a"/>
  <circle cx="256" cy="256" r="115" fill="#261a0e"/>
  <!-- Fork (left) -->
  <g transform="translate(190,200) rotate(-15)" stroke="#d4b89a" stroke-width="10" fill="none" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="130"/>
    <line x1="-18" y1="0" x2="-18" y2="-30"/>
    <line x1="0" y1="0" x2="0" y2="-35"/>
    <line x1="18" y1="0" x2="18" y2="-30"/>
    <line x1="-13" y1="-30" x2="13" y2="-30"/>
  </g>
  <!-- Knife (right) -->
  <g transform="translate(322,200) rotate(15)" stroke="#d4b89a" stroke-width="10" fill="none" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="130"/>
    <line x1="0" y1="0" x2="0" y2="-45"/>
    <path d="M 0,-45 Q 30,-40 25,-10" fill="#d4b89a" stroke="none"/>
  </g>
  <!-- 3 dots on rim -->
  <circle cx="256" cy="95" r="6" fill="#FF6347"/>
  <circle cx="370" cy="140" r="5" fill="#7FFF00"/>
  <circle cx="140" cy="140" r="5" fill="#FFB800"/>
  <!-- Steam wisps -->
  <g stroke="#fff" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M 236,290 Q 226,270 236,250 Q 246,230 236,210" />
    <path d="M 276,295 Q 266,275 276,255 Q 286,235 276,215" />
  </g>
</svg>
